services:
  - type: web
    name: finflow-backend
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        fromContext: production
      - key: MONGO_URI
        sync: false # User should provide their MongoDB Atlas URL in Render Dashboard
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false # User should provide their Gemini API Key in Render Dashboard
